version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: fxion-redis

    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  omnitech-api:
    build: .

    container_name: fxion-api

    command: >
      python omnitech_core.py
      --api
      --telemetry
      --gpu-auto

    ports:
      - "9000:9000"

    environment:
      REDIS_URL: redis://redis:6379
      OMNITECH_QUANT: Q8_0
      OMNITECH_GPU: auto
      OMNITECH_THREADS: "16"
      OMNITECH_CACHE: "true"
      OMNITECH_TELEMETRY: "true"

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./cache:/app/cache

    shm_size: "8gb"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    restart: unless-stopped

  omnitech-worker:
    build: .

    container_name: fxion-worker

    command: >
      python qfx_optimizer.py
      --worker
      --adaptive
      --self-heal

    environment:
      REDIS_URL: redis://redis:6379
      OMNITECH_QUANT: Q8_0
      OMNITECH_BATCH: "32"
      OMNITECH_PREFETCH: "true"

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - ./models:/app/models
      - ./logs:/app/logs

    deploy:
      replicas: 2

    restart: unless-stopped

  telemetry:
    image: prom/prometheus

    container_name: fxion-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    restart: unless-stopped

  dashboard:
    image: grafana/grafana

    container_name: fxion-grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_PASSWORD: fxionadmin

    volumes:
      - grafana_data:/var/lib/grafana

    restart: unless-stopped

volumes:
  redis_data:
  grafana_data: