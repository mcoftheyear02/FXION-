version: '3.8'

services:
  # Redis for job queue and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # API Server (Flask)
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OMNITECH_BASE_MODEL=/models/mistral-7b.f16.gguf
      - OMNITECH_OUTPUT_DIR=/output
      - W_TPS=0.6
      - W_ACC=30.0
      - W_SIZE=0.01
    volumes:
      - ./models:/models:ro
      - ./output:/output
      - ./policy_state:/app/state
    depends_on:
      redis:
        condition: service_healthy
    command: python api/app.py
    restart: unless-stopped

  # WebSocket Stream Server
  websocket:
    build: .
    ports:
      - "8765:8765"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./policy_state:/app/state
    depends_on:
      - redis
      - api
    command: python api/stream_server.py
    restart: unless-stopped

  # Worker (for distributed quantization)
  worker:
    build: .
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OMNITECH_BASE_MODEL=/models/mistral-7b.f16.gguf
      - OMNITECH_QUANT_BIN=/llama.cpp/quantize
    volumes:
      - ./models:/models:ro
      - ./output:/output
      - ./llama.cpp:/llama.cpp:ro
    depends_on:
      - redis
    command: python core/quantizer_rl.py --iterations 100
    deploy:
      replicas: 2
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: "no"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/omnitech.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - websocket
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  policy_state:

networks:
  default:
    name: omnitech-network
