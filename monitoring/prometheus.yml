# OMNITECH OMEGA v3.0 - Prometheus Monitoring Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # API Server metrics
  - job_name: 'omnitech-api'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Node exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    
  # Redis exporter (if using Redis)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    
  # Process exporter (per-process metrics)
  - job_name: 'process'
    static_configs:
      - targets: ['localhost:9256']

# Alerting rules
rule_files:
  - "alerts.yml"

